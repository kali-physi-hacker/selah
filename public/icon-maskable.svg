<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sky" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="48%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#042F2E"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </radialGradient>
  </defs>
  <!-- full-bleed square so the platform mask can crop to any shape -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- centered within the maskable safe zone -->
  <circle cx="256" cy="248" r="150" fill="#FDE68A" opacity="0.18"/>
  <circle cx="256" cy="248" r="92" fill="url(#sun)"/>
  <circle cx="256" cy="248" r="92" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
  <rect x="236" y="356" width="40" height="120" rx="20" fill="#FDE68A" opacity="0.22"/>
</svg>
