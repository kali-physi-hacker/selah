<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="45%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#042F2E"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E5C57"/>
      <stop offset="100%" stop-color="#021F1E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <!-- divine light halo -->
  <circle cx="256" cy="214" r="150" fill="#FDE68A" opacity="0.18"/>
  <!-- the sun / first light -->
  <circle cx="256" cy="214" r="82" fill="url(#sun)"/>
  <circle cx="256" cy="214" r="82" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
  <!-- still waters -->
  <path d="M0 330 H512 V400 Q462 388 412 400 T312 400 T212 400 T112 400 T0 400 Z" fill="url(#water)" opacity="0.92"/>
  <rect x="0" y="396" width="512" height="116" fill="url(#water)"/>
  <!-- reflection of light on the water -->
  <rect x="236" y="332" width="40" height="150" rx="20" fill="#FDE68A" opacity="0.28"/>
</svg>
